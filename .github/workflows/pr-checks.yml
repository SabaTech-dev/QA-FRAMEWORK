name: Pull Request Checks

on:
  pull_request:
    branches: [ main, develop ]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  PYTHON_VERSION: "3.12"

jobs:
  # Fast feedback PR checks
  pr-checks:
    name: PR Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # v4.2.2
        with:
          fetch-depth: 0  # Full history for proper diff

      - name: Set up Python
        uses: actions/setup-python@v5 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4 # v4.2.3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black ruff mypy pytest pytest-cov

      # Code quality checks
      - name: Check code formatting
        id: formatting
        continue-on-error: true
        run: black --check --diff --line-length 100 src tests

      - name: Run linter
        id: linting
        continue-on-error: true
        run: ruff check src tests

      - name: Type check
        id: typecheck
        continue-on-error: true
        run: mypy src --ignore-missing-imports

      # Run only changed tests for faster feedback
      - name: Get changed Python files
        id: changed-files
        run: |
          CHANGED_FILES=$(git diff --name-only --diff-filter=ACMRT ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | grep -E '\.py$' || true)
          echo "changed_files=$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "Changed files: $CHANGED_FILES"

      - name: Run tests for changed files
        id: tests
        if: steps.changed-files.outputs.changed_files != ''
        continue-on-error: true
        run: |
          pytest tests/unit -v \
            --cov=src \
            --cov-report=xml \
            --cov-fail-under=70 \
            -x  # Stop on first failure for fast feedback

      - name: Comment PR with results
        if: always()
        continue-on-error: true  # Gracefully handle permission errors (e.g., dependabot PRs)
        uses: actions/github-script@v7 # v7.1.0
        with:
          script: |
            const outputs = {
              formatting: '${{ steps.formatting.outcome }}',
              linting: '${{ steps.linting.outcome }}',
              typecheck: '${{ steps.typecheck.outcome }}',
              tests: '${{ steps.tests.outcome }}'
            };
            
            const message = `## PR Check Results
            
            ✅ **Code Formatting**: ${outputs.formatting === 'success' ? 'Passed' : 'Failed'}
            ✅ **Linting**: ${outputs.linting === 'success' ? 'Passed' : 'Failed'}
            ✅ **Type Checking**: ${outputs.typecheck === 'success' ? 'Passed' : 'Failed'}
            ✅ **Tests**: ${outputs.tests === 'success' ? 'Passed' : 'Failed'}
            
            ${outputs.tests === 'success' ? '' : '⚠️ Some checks failed. Please review the details above.'}
            `;
            
            try {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: message
              });
            } catch (error) {
              // Gracefully handle permission errors (e.g., dependabot PRs)
              console.log('Could not post PR comment:', error.message);
              if (error.status === 403) {
                console.log('Skipping PR comment due to permission restrictions (likely dependabot PR).');
              } else {
                throw error;
              }
            }

  # PR size check
  pr-size-check:
    name: PR Size Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # v4.2.2
        with:
          fetch-depth: 0

      - name: Check PR size
        run: |
          LINES_CHANGED=$(git diff --stat ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | tail -1 | awk '{print $1}')
          echo "Lines changed: $LINES_CHANGED"
          
          if [ "$LINES_CHANGED" -gt 500 ]; then
            echo "⚠️ Warning: This PR changes more than 500 lines. Consider breaking it into smaller PRs."
            exit 0
          fi
