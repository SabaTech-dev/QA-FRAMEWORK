version: '3.8'

# QA-FRAMEWORK — Coolify Production Deployment
# Ports remapped to avoid conflicts:
#   backend: 8000 → 8010 (Coolify uses 8000)
#   frontend: 3000 → 3010 (AMC uses 3000)
#   postgres: 5432 → 5433 (qa-postgres already on 5433, reuse)
#   redis: 6379 → 7379 (flowsint uses 6379)
#   grafana: 3001 → 3011 (Langfuse uses 3001)

services:
  # ==================== CORE SERVICES ====================

  postgres:
    image: postgres:16-alpine
    container_name: qa-beta-postgres
    environment:
      POSTGRES_DB: qa_dashboard
      POSTGRES_USER: qa_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_production_password}
    volumes:
      - qa-beta-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qa_user -d qa_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: qa-beta-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_redis_password}
    volumes:
      - qa-beta-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==================== APP SERVICES ====================

  backend:
    build:
      context: ./dashboard/backend
      dockerfile: Dockerfile.prod
    container_name: qa-beta-backend
    ports:
      - "8010:8000"
    # config.py reads JWT_SECRET_KEY (not SECRET_KEY) for Settings.secret_key,
    # so JWT_SECRET_KEY MUST be set here or production validation fails with
    # "Missing JWT_SECRET_KEY". Coolify provides the value via ${JWT_SECRET_KEY}
    # substitution from the project's root .env. SECRET_KEY is kept for ops parity.
    environment:
      - DATABASE_URL=postgresql://qa_user:${DB_PASSWORD:-changeme_production_password}@postgres:5432/qa_dashboard
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme_redis_password}
      - SECRET_KEY=${JWT_SECRET_KEY:-changeme_jwt_secret_at_least_32_chars}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-changeme_jwt_secret_at_least_32_chars}
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - qa-beta-backend-logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/live')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  frontend:
    build:
      context: ./dashboard/frontend
      dockerfile: Dockerfile
    container_name: qa-beta-frontend
    ports:
      - "3010:3000"
    environment:
      - VITE_API_URL=http://localhost:8010
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  qa-beta-postgres-data:
  qa-beta-redis-data:
  qa-beta-backend-logs:

networks:
  default:
    name: qa-beta-network
    driver: bridge
