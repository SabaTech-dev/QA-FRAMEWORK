version: '3.8'

services:
  # ==================== DASHBOARD SERVICES ====================
  
  # Backend API
  backend:
    build:
      context: ./dashboard/backend
      dockerfile: Dockerfile
    container_name: qa-framework-backend
    ports:
      - "8010:8000"
    environment:
      - DATABASE_URL=postgresql://qa_user:qa_pass@qa-framework-db:5432/qa_dashboard
      - REDIS_HOST=qa-framework-cache
      - REDIS_PORT=6379
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      # El módulo src/infrastructure/cache/semantic_cache.py no existe en el backend,
      # por lo que SemanticCacheMiddleware consume el body y luego falla al importarlo,
      # devolviendo respuestas vacías (HTTP 200 size=0 / 520 en Cloudflare) para los
      # GET cacheados (suites/cases/executions/dashboard). Vaciar la lista de prefijos
      # desactiva el caché y restaura las respuestas. Fix de infra (sin tocar código backend).
      - SEMANTIC_CACHE_ENDPOINTS=
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./dashboard/backend:/app
      - backend-logs:/app/logs
    networks:
      - qa-network
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; r=urllib.request.urlopen('http://localhost:8000/health'); assert r.status == 200"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Frontend React
  frontend:
    build:
      context: ./dashboard/frontend
      dockerfile: Dockerfile
    container_name: qa-framework-frontend
    ports:
      - "3010:3000"
    environment:
      - VITE_API_URL=/api/v1
      # Vite dev-server proxy target: the backend service on the Docker network.
      # Resolves the "buttons do nothing / pages disconnected" issue where localhost
      # inside the frontend container pointed at itself instead of the backend.
      - API_PROXY_TARGET=http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./dashboard/frontend:/app
      - /app/node_modules
    networks:
      - qa-network
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: qa-framework-db
    environment:
      POSTGRES_DB: qa_dashboard
      POSTGRES_USER: qa_user
      POSTGRES_PASSWORD: qa_pass
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - qa-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qa_user -d qa_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: qa-framework-cache
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - qa-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ==================== VULNERABILITY SCANNER SERVICES ====================

  # Nuclei Scanner - Template-based vulnerability scanner
  nuclei-scanner:
    image: projectdiscovery/nuclei:latest
    container_name: qa-framework-nuclei
    profiles:
      - scanners
      - full
    volumes:
      - nuclei-templates:/root/nuclei-templates
      - ./templates/vuln/custom:/custom-templates
      - ./reports/vuln:/output
    networks:
      - qa-network
    command: ["--help"]
    restart: "no"

  # WSTG Scanner - OWASP Web Security Testing Guide
  wstg-scanner:
    build:
      context: ./docker/vuln
      dockerfile: Dockerfile.wstg
    container_name: qa-framework-wstg
    profiles:
      - scanners
      - full
    volumes:
      - ./reports/vuln:/output
    networks:
      - qa-network
    command: ["--help"]
    restart: "no"

  # ==================== MONITORING SERVICES ====================
  
  # Prometheus
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: qa-framework-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    volumes:
      - ./dashboard/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - qa-network
    restart: unless-stopped

  # Grafana
  grafana:
    image: grafana/grafana:10.0.0
    container_name: qa-framework-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./dashboard/monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    networks:
      - qa-network
    depends_on:
      - prometheus
    restart: unless-stopped

  # Alertmanager
  alertmanager:
    image: prom/alertmanager:v0.25.0
    container_name: qa-framework-alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./dashboard/monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager-data:/alertmanager
    ports:
      - "9093:9093"
    networks:
      - qa-network
    restart: unless-stopped

# Named volumes
volumes:
  postgres-data:
  redis-data:
  backend-logs:
  prometheus-data:
  grafana-data:
  alertmanager-data:
  nuclei-templates:

# Networks
networks:
  qa-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16
