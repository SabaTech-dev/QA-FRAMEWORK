[pytest]
# DeepEval LLM test configuration
# This pytest.ini isolates LLM tests from the main test suite's heavy plugin dependencies.
# Use: pytest tests/llm/ -c tests/llm/pytest.ini

testpaths = tests/llm
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    llm: LLM evaluation tests using DeepEval
    llm_answer_relevancy: Answer relevancy metric tests
    llm_faithfulness: Faithfulness metric tests
    llm_toxicity: Toxicity metric tests
    llm_geval: GEval custom criteria metric tests
    llm_integration: Full pipeline LLM integration tests
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning:deepeval
    ignore::PendingDeprecationWarning:deepeval
