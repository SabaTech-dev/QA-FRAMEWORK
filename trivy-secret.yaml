# Trivy Secret Scanning Configuration
# QA-Framework

# Allowlist for known test/dummy secrets
allow-rules:
  # Allow example/test secrets in documentation and test files
  - id: test-secret-example
    description: "Test/example secrets in non-production files"
    pattern: "example|test|dummy|placeholder|changeme|secret123"
    paths:
      - "tests/"
      - "examples/"
      - "docs/"
      - "*.md"

# Custom rules for project-specific secrets
rules:
  - id: qa-framework-secret-key
    description: "QA-FRAMEWORK SECRET_KEY"
    pattern: "SECRET_KEY\\s*[:=]\\s*['\"][^'\"]+['\"]"
    severity: HIGH
    paths:
      - "!tests/"
      - "!examples/"
      - "!*.md"
